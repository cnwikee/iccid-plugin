<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ICCID格式化工具</title>
  <script src="https://lf3-static.bytednsdoc.com/obj/eden-cn/ptlz_zlp/ljhwZthlaukjlkulzlp/bitable-web-sdk/bitable-web-sdk.umd.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .container {
      padding: 20px;
      max-width: 400px;
      margin: 0 auto;
    }
    .title {
      font-size: 18px;
      font-weight: 600;
      color: #333;
      margin-bottom: 20px;
      text-align: center;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #666;
      margin-bottom: 8px;
    }
    select, button {
      width: 100%;
      height: 40px;
      padding: 0 12px;
      border: 1px solid #e5e6eb;
      border-radius: 4px;
      font-size: 14px;
      outline: none;
    }
    select:focus {
      border-color: #0066ff;
    }
    button {
      background: #0066ff;
      color: white;
      border: none;
      cursor: pointer;
      font-weight: 500;
    }
    button:disabled {
      background: #c9cdd4;
      cursor: not-allowed;
    }
    .result {
      margin-top: 20px;
      padding: 12px;
      border-radius: 4px;
      font-size: 14px;
      display: none;
    }
    .success {
      background: #e8f4ff;
      color: #0066ff;
      border: 1px solid #bbdcff;
    }
    .error {
      background: #fff1f0;
      color: #f53f3f;
      border: 1px solid #ffcece;
    }
    .tip {
      font-size: 12px;
      color: #999;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">ICCID格式化工具</div>
    <div class="form-group">
      <label>选择ICCID所在列</label>
      <select id="columnSelect">
        <option value="">加载中...</option>
      </select>
      <div class="tip">仅支持文本/数字类型列</div>
    </div>
    <button id="formatBtn" disabled>格式化选中单元格ICCID</button>
    <div id="result" class="result"></div>
  </div>

  <script>
    // 飞书官方正确初始化方式 ✅
    window.addEventListener('message', async (event) => {
      if (event.data === 'feishu:bitable:iframe:ready') {
        await startPlugin();
      }
    });

    let bitableInstance;
    let currentTable;

    async function startPlugin() {
      try {
        bitableInstance = window.bitable;
        currentTable = await bitableInstance.base.getActiveTable();
        const fieldList = await currentTable.getFieldList();
        renderFields(fieldList);
        document.getElementById('formatBtn').disabled = false;
        showResult("插件加载成功", "success");
      } catch (err) {
        showResult("初始化失败：" + err.message, "error");
      }
    }

    function renderFields(fields) {
      const select = document.getElementById('columnSelect');
      select.innerHTML = '<option value="">请选择ICCID列</option>';
      fields.forEach(field => {
        if (field.type === 1 || field.type === 2) {
          const opt = document.createElement('option');
          opt.value = field.id;
          opt.textContent = field.name;
          select.appendChild(opt);
        }
      });
    }

    function validateICCID(iccid) {
      let str = String(iccid).trim().replace(/\s/g, '').toUpperCase();
      if (str.length !== 20) return { valid: false };
      if (!/^[0-9]{19}[0-9A-F]$/.test(str)) return { valid: false };
      const prefix = str.slice(0,6);
      const allowPrefix = [
        '898600','898602','898604','898607',
        '898601','898606','898609',
        '898603','898611'
      ];
      if (!allowPrefix.includes(prefix)) return { valid: false };
      return { valid: true, cleanStr: str };
    }

    function formatICCID(s) {
      return s.replace(/(.{4})(?=.)/g, '$1 ');
    }

    function showResult(text, type) {
      const el = document.getElementById('result');
      el.style.display = 'block';
      el.className = 'result ' + type;
      el.textContent = text;
    }

    document.getElementById('formatBtn').addEventListener('click', async () => {
      const fieldId = document.getElementById('columnSelect').value;
      if (!fieldId) {
        showResult("请选择ICCID列", "error");
        return;
      }

      try {
        const selection = await bitableInstance.selection.getSelection();
        if (!selection?.recordIds?.length) {
          showResult("请选中单元格", "error");
          return;
        }

        let ok = 0, err = 0;
        for (const id of selection.recordIds) {
          const record = await currentTable.getRecord(id);
          const val = record.fields[fieldId] || '';
          const check = validateICCID(val);
          if (!check.valid) { err++; continue; }
          const formatted = formatICCID(check.cleanStr);
          await currentTable.setRecord(id, { [fieldId]: formatted });
          ok++;
        }
        showResult(`完成：成功 ${ok} 条，失败 ${err} 条`, "success");
      } catch (e) {
        showResult("错误：" + e.message, "error");
      }
    });
  </script>
</body>
</html>
